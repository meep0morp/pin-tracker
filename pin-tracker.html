<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pin Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint-50:  #f2faf6;
      --mint-100: #ddf2ea;
      --mint-150: #cceade;
      --mint-200: #b3dfce;
      --mint-400: #52b58d;
      --mint-500: #33996e;
      --mint-600: #237d58;
      --mint-700: #195f43;
      --mint-800: #10422e;
      --text-h:   #0e3527;
      --text-p:   #285440;
      --text-s:   #4a7a63;
      --text-m:   #80ab94;
    }

    html, body {
      height: 100%;
      background: transparent;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      font-family: 'DM Mono', monospace;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--mint-100);
      border: 1.5px solid var(--mint-200);
      border-radius: 18px;
      padding: 26px 28px 20px;
      transition: box-shadow 0.3s, border-color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .card.active {
      background: linear-gradient(150deg, #cef0e2 0%, #e2f7ef 60%, #f0fdf8 100%);
      border-color: var(--mint-400);
      box-shadow: 0 0 0 5px rgba(51,153,110,0.10), 0 4px 24px rgba(51,153,110,0.08);
    }

    /* Subtle dot pattern overlay */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(51,153,110,0.06) 1px, transparent 1px);
      background-size: 18px 18px;
      pointer-events: none;
      border-radius: inherit;
    }

    /* ── Header ── */
    .date-line {
      font-size: 10.5px;
      font-weight: 400;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-m);
      margin-bottom: 10px;
    }

    .status-icon {
      font-size: 26px;
      line-height: 1;
      margin-bottom: 6px;
      display: block;
    }

    .status-title {
      font-family: 'Fraunces', serif;
      font-size: 40px;
      font-weight: 400;
      color: var(--mint-600);
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 5px;
    }

    .card.active .status-title {
      color: var(--mint-700);
    }

    .compound-tag {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--mint-500);
      letter-spacing: 0.03em;
      margin-top: 14px;
    }

    .site-tag {
      font-size: 10.5px;
      color: var(--text-s);
      letter-spacing: 0.05em;
      margin-top: 3px;
    }

    .week-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--mint-600);
      color: #e8f9f0;
      border-radius: 30px;
      padding: 3px 11px;
      font-size: 9.5px;
      letter-spacing: 0.07em;
      font-weight: 500;
      margin-top: 11px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--mint-200);
      margin: 18px 0 15px;
    }

    /* ── Last / Next ── */
    .pins-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .pin-col label {
      display: block;
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--text-m);
      margin-bottom: 3px;
    }

    .pin-col .pin-val {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-h);
    }

    /* ── Schedule toggle ── */
    .sched-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 16px;
      padding: 8px 14px;
      width: 100%;
      background: rgba(255,255,255,0.70);
      border: 1px solid var(--mint-200);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-s);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
      backdrop-filter: blur(2px);
    }

    .sched-btn:hover {
      background: rgba(255,255,255,0.95);
      border-color: var(--mint-400);
      color: var(--mint-600);
    }

    .sched-btn .arrow {
      margin-left: auto;
      font-size: 9px;
      transition: transform 0.2s;
      color: var(--text-m);
    }

    .sched-btn.open .arrow { transform: rotate(180deg); }

    /* ── Schedule grid ── */
    .sched-grid {
      display: none;
      margin-top: 10px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--mint-150);
      border-radius: 12px;
      overflow: hidden;
    }

    .sched-grid.open { display: block; }

    .sched-head, .sched-row {
      display: grid;
      grid-template-columns: 34px 1fr 1fr;
      gap: 0;
    }

    .sched-head {
      padding: 6px 12px;
      background: var(--mint-100);
      border-bottom: 1px solid var(--mint-150);
    }

    .sched-head span {
      font-size: 8.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-m);
      font-weight: 500;
    }

    .sched-row {
      padding: 5px 12px;
      border-bottom: 1px solid rgba(179,223,206,0.35);
      font-size: 11px;
    }

    .sched-row:last-child { border-bottom: none; }

    .sched-row.cur-week { background: rgba(82,181,141,0.10); }

    .sched-row .wk { color: var(--text-m); font-size: 10px; }
    .sched-row .done { color: var(--mint-400); }
    .sched-row .today { color: var(--mint-700); font-weight: 600; }
    .sched-row .future { color: var(--text-s); }

    /* ── Cycle-complete state ── */
    .complete-msg {
      font-size: 11px;
      color: var(--text-s);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="date-line" id="dateLine"></div>
    <span class="status-icon" id="icon">💉</span>
    <div class="status-title" id="title">—</div>
    <div class="compound-tag" id="compound">Test C · 0.6 mL · 23G 1″ IM</div>
    <div class="site-tag" id="site"></div>
    <div class="week-badge" id="badge"></div>

    <div class="divider"></div>

    <div class="pins-row">
      <div class="pin-col">
        <label>Last Pin</label>
        <div class="pin-val" id="lastPin">—</div>
      </div>
      <div class="pin-col">
        <label>Next Pin</label>
        <div class="pin-val" id="nextPin">—</div>
      </div>
    </div>

    <button class="sched-btn" id="schedBtn" onclick="toggleSched()">
      📅 Full E3.5D schedule
      <span class="arrow">▼</span>
    </button>

    <div class="sched-grid" id="schedGrid">
      <div class="sched-head">
        <span>Wk</span><span>Monday</span><span>Thursday</span>
      </div>
      <div id="schedRows"></div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const CYCLE_START  = new Date(2026, 4, 18);   // May 18 2026 (Mon) — Cycle #5
    const CYCLE_WEEKS  = 16;
    const CYCLE_NUM    = 5;
    const COMPOUND     = 'Test C · 0.6 mL · 23G 1″ IM';
    const SITE_MON     = 'Monday AM · Quad or glute';
    const SITE_THU     = 'Thursday PM · Quad or glute';
    // ────────────────────────────────────────────────────────────────────────

    const PIN_DAYS = [1, 4]; // JS day indices: 1=Mon, 4=Thu

    function zeroTime(d) {
      const c = new Date(d); c.setHours(0,0,0,0); return c;
    }

    function today() { return zeroTime(new Date()); }

    function fmt(d) {
      return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    }
    function fmtShort(d) {
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    }

    function prevPin(from) {
      const d = new Date(from); d.setDate(d.getDate() - 1);
      while (!PIN_DAYS.includes(d.getDay())) d.setDate(d.getDate() - 1);
      return zeroTime(d);
    }

    function nextPinAfter(from) {
      const d = new Date(from); d.setDate(d.getDate() + 1);
      while (!PIN_DAYS.includes(d.getDay())) d.setDate(d.getDate() + 1);
      return zeroTime(d);
    }

    function cycleWeek(d) {
      const diff = zeroTime(d) - zeroTime(CYCLE_START);
      return Math.min(CYCLE_WEEKS, Math.max(1, Math.floor(diff / 86400000 / 7) + 1));
    }

    function cycleEnd() {
      const d = new Date(CYCLE_START);
      d.setDate(d.getDate() + CYCLE_WEEKS * 7 + 3); // ~last Thu of wk 16
      return zeroTime(d);
    }

    function buildSchedule() {
      const t = today();
      let html = '';
      for (let w = 1; w <= CYCLE_WEEKS; w++) {
        const mon = new Date(CYCLE_START); mon.setDate(mon.getDate() + (w-1)*7);
        const thu = new Date(mon);          thu.setDate(thu.getDate() + 3);
        zeroTime(mon); zeroTime(thu);

        const curW = cycleWeek(t) === w;
        const mCls = t.getTime() === mon.getTime() ? 'today' : t > mon ? 'done' : 'future';
        const tCls = t.getTime() === thu.getTime() ? 'today' : t > thu ? 'done' : 'future';
        const mSym = mCls === 'done' ? '✓ ' : mCls === 'today' ? '● ' : '';
        const tSym = tCls === 'done' ? '✓ ' : tCls === 'today' ? '● ' : '';

        html += `<div class="sched-row${curW?' cur-week':''}">
          <span class="wk">${w}</span>
          <span class="${mCls}">${mSym}${fmtShort(mon)}</span>
          <span class="${tCls}">${tSym}${fmtShort(thu)}</span>
        </div>`;
      }
      document.getElementById('schedRows').innerHTML = html;
    }

    function render() {
      const t      = today();
      const card   = document.getElementById('card');
      const isPin  = PIN_DAYS.includes(t.getDay());
      const before = t < zeroTime(CYCLE_START);
      const after  = t > cycleEnd();

      // Date line
      document.getElementById('dateLine').textContent =
        t.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

      if (before) {
        card.classList.remove('active');
        document.getElementById('icon').textContent  = '⏳';
        document.getElementById('title').textContent = 'Not started';
        document.getElementById('site').textContent  = 'Cycle #5 begins May 18, 2026';
        document.getElementById('badge').textContent = `Cycle #${CYCLE_NUM} · Upcoming`;
      } else if (after) {
        card.classList.remove('active');
        document.getElementById('icon').textContent  = '✅';
        document.getElementById('title').textContent = 'Cycle complete';
        document.getElementById('site').textContent  = 'Cycle #5 — 16 weeks done';
        document.getElementById('badge').textContent = `Cycle #${CYCLE_NUM} · Complete`;
      } else if (isPin) {
        card.classList.add('active');
        document.getElementById('icon').textContent  = '💉';
        document.getElementById('title').textContent = 'Pin day';
        document.getElementById('site').textContent  = t.getDay() === 1 ? SITE_MON : SITE_THU;
        document.getElementById('badge').textContent = `Cycle #${CYCLE_NUM} · Week ${cycleWeek(t)} / ${CYCLE_WEEKS}`;
      } else {
        card.classList.remove('active');
        const nxt = nextPinAfter(t);
        const days = Math.round((nxt - t) / 86400000);
        document.getElementById('icon').textContent  = '⏱';
        document.getElementById('title').textContent = days === 1 ? 'Tomorrow' : `In ${days} days`;
        document.getElementById('site').textContent  = nxt.getDay() === 1 ? SITE_MON : SITE_THU;
        document.getElementById('badge').textContent = `Cycle #${CYCLE_NUM} · Week ${cycleWeek(t)} / ${CYCLE_WEEKS}`;
      }

      // Last / Next
      const lp = before ? null : prevPin(before ? CYCLE_START : t);
      const np = after  ? null : nextPinAfter(t);
      document.getElementById('lastPin').textContent = lp ? fmt(lp) : '—';
      document.getElementById('nextPin').textContent = np && !after ? fmt(np) : '—';

      buildSchedule();
    }

    function toggleSched() {
      const btn  = document.getElementById('schedBtn');
      const grid = document.getElementById('schedGrid');
      btn.classList.toggle('open');
      grid.classList.toggle('open');
    }

    render();

    // Auto-refresh at midnight
    const n = new Date();
    const msToMidnight = new Date(n.getFullYear(), n.getMonth(), n.getDate()+1) - n;
    setTimeout(() => { render(); setInterval(render, 86400000); }, msToMidnight);
  </script>
</body>
</html>
