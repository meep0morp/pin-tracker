<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pin Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --ink:  #081510;   /* near-black */
  --ink2: #1a3828;   /* dark body text */
  --ink3: #253f31;   /* was #4d7262 — much darker now */
  --ink4: #3a5a4a;   /* was #89a898 — much darker now */
  --rule: #c8dcd4;   /* slightly darker rules */
  --g900: #08391f;
  --g700: #115230;
  --g600: #1a7044;
  --g500: #248f5a;
  --g400: #3daa72;
  --g200: #9ed4b8;
  --g100: #d5f0e2;
  --g050: #edf9f3;
}

html, body {
  height: 100%;
  background: #fff;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;           /* base weight up from 400 */
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  justify-content: center;
  padding: 18px 20px 14px;
}

.wrap {
  width: 100%;
  max-width: 460px;
  animation: up .4s cubic-bezier(.22,1,.36,1);
}

@keyframes up {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TOP STRIP ────────────────────────────── */
.top-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 11px;
  margin-bottom: 14px;
  border-bottom: 1.5px solid var(--rule);
}

.top-date {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .06em;
  color: var(--ink3);
}

.top-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cycle-badge {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--g700);
}

.bell {
  font-size: 14px;
  cursor: pointer;
  color: var(--ink4);
  text-decoration: none;
  transition: color .15s;
}
.bell:hover   { color: var(--g700); }
.bell.granted { opacity: .3; cursor: default; }

/* ── TWO-COLUMN MAIN GRID ─────────────────── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin-bottom: 14px;
  align-items: stretch;
}

/* ── LEFT: HERO ───────────────────────────── */
.hero-box {
  padding-right: 16px;
}

.hero-inner {
  height: 100%;
  border: 1.5px solid var(--rule);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 140px;
}

/* Idle */
.num-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 5px;
  line-height: 1;
}

.hero-num {
  font-family: 'Lora', serif;
  font-size: 60px;
  font-weight: 700;
  color: var(--g900);
  letter-spacing: -.03em;
  line-height: .9;
}

.hero-unit {
  font-family: 'Lora', serif;
  font-size: 20px;
  font-weight: 500;
  font-style: italic;
  color: var(--g600);
  padding-bottom: 2px;
}

.hero-sub {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink3);
  letter-spacing: .02em;
  line-height: 1.5;
}

/* Pin day */
.hero-inner.pin-mode {
  background: var(--g900);
  border-color: var(--g900);
  overflow: hidden;
  position: relative;
}

.hero-inner.pin-mode::before {
  content: '';
  position: absolute;
  width: 140px; height: 140px;
  top: -50px; right: -40px;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
  pointer-events: none;
}

.pd-eye {
  font-size: 9px;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--g400);
  margin-bottom: 7px;
}

.pd-head {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 5px;
}

.pd-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--g400);
  flex-shrink: 0;
  position: relative;
}

.pd-dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid var(--g400);
  animation: ring 1.8s ease-out infinite;
}

@keyframes ring {
  0%   { transform: scale(1);   opacity: .8; }
  100% { transform: scale(2.4); opacity: 0;  }
}

.pd-title {
  font-family: 'Lora', serif;
  font-size: 38px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.025em;
  line-height: .9;
}

.pd-date {
  font-size: 11.5px;
  color: var(--g400);
  letter-spacing: .03em;
  margin-bottom: 10px;
}

.mark-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 7px;
  border: 1.5px solid rgba(255,255,255,.22);
  background: rgba(255,255,255,.09);
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: .04em;
  cursor: pointer;
  transition: background .15s;
}

.mark-btn:hover { background: rgba(255,255,255,.16); }

.mark-btn.done {
  background: rgba(255,255,255,.13);
  border-color: rgba(255,255,255,.28);
  color: rgba(255,255,255,.6);
  cursor: default;
}

/* ── RIGHT: DATA ──────────────────────────── */
.data-col {
  padding-left: 16px;
  border-left: 1.5px solid var(--rule);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding-top: 4px;
  padding-bottom: 4px;
}

.d-lbl {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink4);
  margin-bottom: 3px;
}

.d-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}

.d-val.hi { color: var(--g700); }

.d-rel {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--ink4);
  margin-top: 2px;
  font-style: italic;
}

/* ── COMPOUND LINE ────────────────────────── */
.compound-line {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink3);
  letter-spacing: .03em;
  padding: 11px 0;
  border-top: 1.5px solid var(--rule);
  border-bottom: 1.5px solid var(--rule);
  margin-bottom: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── PROGRESS ─────────────────────────────── */
.prog-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 7px;
}

.prog-lbl {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--ink4);
}

.prog-val {
  font-size: 11px;
  font-weight: 700;
  color: var(--g700);
}

.bar-track {
  height: 5px;
  background: var(--g200);
  border-radius: 3px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--g700);
  border-radius: 3px;
  transition: width .7s cubic-bezier(.22,1,.36,1);
}

/* ── SCHEDULE (below fold — intentional) ──── */
.sched-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 13px 0 0;
  margin-top: 13px;
  border-top: 1.5px solid var(--rule);
  border-bottom: none; border-left: none; border-right: none;
  background: none;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
}

.sched-btn:hover .s-lbl { color: var(--g700); }

.s-lbl {
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--ink4);
  transition: color .15s;
}

.s-arrow {
  font-size: 10px;
  color: var(--ink4);
  transition: transform .25s cubic-bezier(.22,1,.36,1);
}

.s-arrow.open { transform: rotate(180deg); }

.sched-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .45s cubic-bezier(.22,1,.36,1);
}

.sched-body.open { max-height: 1100px; }

.sched-inner {
  padding-top: 14px;
  border-top: 1.5px solid var(--rule);
  margin-top: 13px;
}

.sched-head {
  display: grid;
  grid-template-columns: 28px 1fr 1fr;
  gap: 4px;
  padding: 0 2px 7px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 3px;
}

.sched-head span {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink4);
}

.s-row {
  display: grid;
  grid-template-columns: 28px 1fr 1fr;
  gap: 4px;
  padding: 4.5px 2px;
  border-radius: 5px;
}

.s-row.cur { background: var(--g050); }
.s-wk  { font-size: 11px; font-weight: 600; color: var(--ink4); padding-top: 1px; }
.s-pin { font-size: 13px; font-weight: 500; }

/* ● Confirmed — explicitly marked. Dark, bold, filled dot. */
.s-pin.confirmed {
  color: var(--g700);
  font-weight: 700;
}

/* ✓ Done — past but not confirmed. Clearly readable but visually secondary. */
.s-pin.done {
  color: var(--ink4);
  font-weight: 500;
}

/* ● Active — today's pin. */
.s-pin.active {
  color: var(--g600);
  font-weight: 700;
}

/* Future — upcoming. Muted. */
.s-pin.future {
  color: #8aad9d;
  font-weight: 500;
}

/* Empty — placeholder (Thu Oct 8 past cycle end). */
.s-pin.empty { color: var(--rule); }

/* Clickable past pins */
.s-pin.done,
.s-pin.confirmed {
  cursor: pointer;
  border-radius: 4px;
  padding: 1px 3px;
  margin: -1px -3px;
  transition: background .12s;
}
.s-pin.done:hover     { background: var(--g100); color: var(--g700); }
.s-pin.confirmed:hover{ background: var(--g100); }

/* Pinned state — hero banner shifts shade when today's shot is marked */
.hero-inner.pin-mode.pinned { background: var(--g700); }
</style>
</head>
<body>
<div class="wrap">

  <!-- TOP STRIP -->
  <div class="top-strip">
    <div id="topDate" class="top-date"></div>
    <div class="top-right">
      <div id="cycleBadge" class="cycle-badge"></div>
      <a id="bellBtn" class="bell" href="#" onclick="onBell(event)" title="Enable pin reminders">🔔</a>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT: STATUS -->
    <div class="hero-box">
      <div id="heroInner" class="hero-inner">

        <!-- Idle (non-pin day) -->
        <div id="heroIdle">
          <div class="num-row">
            <div id="heroNum" class="hero-num">—</div>
            <div id="heroUnit" class="hero-unit"></div>
          </div>
          <div id="heroSub" class="hero-sub"></div>
        </div>

        <!-- Pin day -->
        <div id="heroPin" style="display:none">
          <div id="pdEye" class="pd-eye"></div>
          <div class="pd-head">
            <div class="pd-dot"></div>
            <div class="pd-title">Pin Day</div>
          </div>
          <div id="pdDate" class="pd-date"></div>
          <button id="markBtn" class="mark-btn" onclick="toggleMark()">
            <span id="markIco">○</span>
            <span id="markTxt">Mark as pinned</span>
          </button>
        </div>

      </div>
    </div>

    <!-- RIGHT: DATA -->
    <div class="data-col">
      <div>
        <div class="d-lbl">Last Pin</div>
        <div id="lastVal" class="d-val">—</div>
        <div id="lastRel" class="d-rel"></div>
      </div>
      <div>
        <div class="d-lbl">Next Pin</div>
        <div id="nextVal" class="d-val hi">—</div>
        <div id="nextRel" class="d-rel"></div>
      </div>
      <div>
        <div class="d-lbl">Cycle End</div>
        <div id="endVal" class="d-val">—</div>
        <div id="endRel" class="d-rel"></div>
      </div>
    </div>

  </div><!-- /main-grid -->

  <!-- COMPOUND LINE -->
  <div id="compoundLine" class="compound-line"></div>

  <!-- PROGRESS -->
  <div class="prog-meta">
    <span class="prog-lbl">Cycle Progress</span>
    <span id="progVal" class="prog-val"></span>
  </div>
  <div class="bar-track">
    <div id="barFill" class="bar-fill" style="width:0%"></div>
  </div>

  <!-- SCHEDULE (below fold — scroll to see) -->
  <button class="sched-btn" onclick="toggleSched()">
    <span class="s-lbl">Full E3.5D Schedule</span>
    <span id="sArrow" class="s-arrow">▼</span>
  </button>

  <div id="schedBody" class="sched-body">
    <div class="sched-inner">
      <div class="sched-head">
        <span>Wk</span><span>Monday</span><span>Thursday</span>
      </div>
      <div id="schedRows"></div>
    </div>
  </div>

</div><!-- /wrap -->

<script>
// ══════════════════════════════════════════════
//  CONFIG — edit only this block
// ══════════════════════════════════════════════
const DEFAULTS = {
  cycleNum:   5,
  compound:   'Test C',
  dose:       '0.6 mL',
  mgPerPin:   '150 mg',
  needle:     '23G 1″ IM',
  site:       'Glute',
  blastStart: new Date(2026, 4, 18),  // May 18 2026 — first shot
  cycleEnd:   new Date(2026, 9, 5),   // Oct 5 2026  — last shot (20 wks exactly)
  pinDays:    [1, 4],                 // Mon=1, Thu=4
};
// ══════════════════════════════════════════════
// ARCHIVE: embed a past cycle by appending URL params:
//   ?cycle=4&start=2025-11-10&end=2026-02-16
// ══════════════════════════════════════════════
const C = Object.assign({}, DEFAULTS);
(function(){
  const p=new URLSearchParams(window.location.search);
  const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
  if(p.get('cycle')) C.cycleNum   = parseInt(p.get('cycle'));
  if(p.get('start')) C.blastStart = pd(p.get('start'));
  if(p.get('end'))   C.cycleEnd   = pd(p.get('end'));
})();
// ══════════════════════════════════════════════

const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FMON  = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];

const zd   = d => { const c=new Date(d); c.setHours(0,0,0,0); return c; };
const now  = () => zd(new Date());
const dif  = (a,b) => Math.round((zd(b)-zd(a))/86400000);
const isP  = d => C.pinDays.includes(zd(d).getDay());
const isFr = () => { try{return window.self!==window.top;}catch(e){return true;} };

function fmtS(d){ return `${MON[d.getMonth()]} ${d.getDate()}`; }
function fmtM(d){ return `${DAYS[d.getDay()]} ${MON[d.getMonth()]} ${d.getDate()}`; }
function fmtF(d){ return `${FDAYS[d.getDay()]}, ${FMON[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }
function isoFmt(d){ return zd(d).toISOString().slice(0,10); }

function prevPin(t){
  const d=zd(t); d.setDate(d.getDate()-1);
  while(!isP(d)) d.setDate(d.getDate()-1);
  return zd(d);
}
function nextPin(t){
  const d=zd(t); d.setDate(d.getDate()+1);
  while(!isP(d)) d.setDate(d.getDate()+1);
  return zd(d);
}

// Derived from explicit start/end dates — no hardcoded week count
function totalDays()  { return dif(C.blastStart, C.cycleEnd); }          // 140
function totalWeeks() { return Math.round(totalDays() / 7); }              // 20
function cycleWeek(d) {
  const days = dif(C.blastStart, d);
  if(days < 0) return 0;
  return Math.min(totalWeeks(), Math.floor(days/7)+1);
}

function rel(d){
  const df=dif(now(),d);
  if(df===0)  return 'today';
  if(df===1)  return 'tomorrow';
  if(df===-1) return 'yesterday';
  return df<0?`${Math.abs(df)}d ago`:`in ${df}d`;
}

// ── Per-pin localStorage ─────────────────────────────────
// Key: p_{cycleNum}_{YYYY-MM-DD}  avoids cross-cycle collision
function pinKey(d)       { return `p_${C.cycleNum}_${isoFmt(d)}`; }
function isPinnedDate(d) { return localStorage.getItem(pinKey(d))==='1'; }
function setPinnedDate(d,v){ localStorage.setItem(pinKey(d),v?'1':'0'); }

function applyMark(){
  const pinned=isPinnedDate(now());
  const btn=document.getElementById('markBtn');
  const ico=document.getElementById('markIco');
  const txt=document.getElementById('markTxt');
  const box=document.getElementById('heroInner');
  if(pinned){
    btn.classList.add('done'); ico.textContent='●'; txt.textContent='Pinned ✓';
    box.classList.add('pinned');
  } else {
    btn.classList.remove('done'); ico.textContent='○'; txt.textContent='Mark as pinned';
    box.classList.remove('pinned');
  }
}

function toggleMark(){
  setPinnedDate(now(), !isPinnedDate(now()));
  applyMark();
  buildSched(now()); // re-render schedule to reflect new state
}

// ── Notifications ────────────────────────────────────────
function maybeNotify(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const t=now();
  if(!isP(t)||dif(C.blastStart,t)<0) return;
  const k=`n_${isoFmt(t)}`;
  if(localStorage.getItem(k)==='1') return;
  new Notification('💉 Pin Day',{
    body:`${C.compound} · ${C.dose} · ${C.mgPerPin} · Cycle #${C.cycleNum}, Wk ${cycleWeek(t)}/${totalWeeks()}`,
    tag:'pin-day',
  });
  localStorage.setItem(k,'1');
}

function updateBell(){
  const b=document.getElementById('bellBtn');
  if(Notification.permission==='granted'){
    b.classList.add('granted'); b.title='Reminders enabled';
    b.onclick=e=>e.preventDefault();
  }
}

function onBell(e){
  e.preventDefault();
  if(!('Notification' in window)||Notification.permission==='granted') return;
  if(isFr()) window.open(window.location.href.split('?')[0]+'?notify=1','_blank');
  else Notification.requestPermission().then(p=>{ if(p==='granted') maybeNotify(); updateBell(); });
}

function setupNotifs(){
  if(!('Notification' in window)){document.getElementById('bellBtn').style.display='none';return;}
  if(window.location.search.includes('notify')){
    Notification.requestPermission().then(p=>{ if(p==='granted') maybeNotify(); updateBell(); });
  }
  if(Notification.permission==='granted') maybeNotify();
  updateBell();
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) maybeNotify(); });
}

// ── Schedule ─────────────────────────────────────────────
// Loops week-by-week from blastStart; stops when Monday > cycleEnd.
// Week 21 row = Mon Oct 5 only (Thu Oct 8 is past cycleEnd → shown as —).
// Pin states:
//   confirmed = explicitly marked (dark green, bold ●)
//   done      = past, not marked  (faded ✓)
//   active    = today             (pulsing ●)
//   future    = upcoming          (muted)
function buildSched(t){
  const el=document.getElementById('schedRows');
  el.innerHTML='';
  const start=zd(C.blastStart), end=zd(C.cycleEnd);
  const wk=cycleWeek(t);
  const tw=totalWeeks();

  for(let w=1; w<=tw+1; w++){
    const mon=new Date(start); mon.setDate(start.getDate()+(w-1)*7);
    const mz=zd(mon);
    if(mz>end) break;

    const thu=new Date(mz); thu.setDate(mz.getDate()+3);
    const tz=zd(thu);
    const thuValid=tz<=end;
    const md=dif(t,mz), td=thuValid?dif(t,tz):null;

    const cls=(diff,date)=>{
      if(diff===null)  return 'future empty';
      if(diff===0)     return 'active';
      if(diff>0)       return 'future';
      return isPinnedDate(date)?'confirmed':'done';
    };
    const sym=(diff,date)=>{
      if(diff===null||diff>0) return '';
      if(diff===0)  return '● ';
      return isPinnedDate(date)?'● ':'✓ ';
    };

    const row=document.createElement('div');
    row.className=`s-row${w===wk?' cur':''}`;

    const wkEl=document.createElement('div');
    wkEl.className='s-wk';
    wkEl.textContent=w;
    row.appendChild(wkEl);

    // Build each pin cell; past pins are clickable to toggle confirmed
    [[md,mz],[td,tz]].forEach(([diff,date],i)=>{
      const cell=document.createElement('div');
      const isValidDate = i===0 || thuValid;
      if(!isValidDate){
        cell.className='s-pin future empty';
        cell.textContent='—';
      } else {
        cell.className=`s-pin ${cls(diff,date)}`;
        cell.textContent=(sym(diff,date))+(diff===null?'':fmtS(date));
        // Past pins: click to toggle confirmed
        if(diff!==null && diff<0){
          cell.title='Tap to toggle confirmed';
          cell.onclick=()=>{
            setPinnedDate(date, !isPinnedDate(date));
            buildSched(t);
            // If toggling today's date, also update hero button
            if(dif(now(),date)===0) applyMark();
          };
        }
      }
      row.appendChild(cell);
    });

    el.appendChild(row);
  }
}

function toggleSched(){
  document.getElementById('schedBody').classList.toggle('open');
  document.getElementById('sArrow').classList.toggle('open');
}

// ── Render ───────────────────────────────────────────────
function render(){
  const t      = now();
  const start  = zd(C.blastStart);
  const end    = zd(C.cycleEnd);
  const tw     = totalWeeks();   // 20
  const td     = totalDays();    // 140
  const wk     = cycleWeek(t);
  const elapsed= Math.max(0,dif(start,t));
  const pct    = Math.min(100,Math.max(0,Math.round(elapsed/td*100)));
  const inCycle= t>=start && t<=end;
  const pinDay = isP(t) && inCycle;

  // Top strip
  const archived = C.cycleNum !== DEFAULTS.cycleNum ||
                   C.blastStart.getTime() !== DEFAULTS.blastStart.getTime();
  document.getElementById('topDate').textContent = archived ? fmtF(C.blastStart)+' → '+fmtF(C.cycleEnd) : fmtF(t);
  document.getElementById('cycleBadge').textContent =
    inCycle ? `Cycle #${C.cycleNum} · Wk ${wk}/${tw}` : `Cycle #${C.cycleNum}`;

  // Hero
  const box  = document.getElementById('heroInner');
  const idle = document.getElementById('heroIdle');
  const pin  = document.getElementById('heroPin');

  if(archived && !inCycle){
    // Archived view — show summary state
    box.classList.remove('pin-mode','pinned');
    pin.style.display='none'; idle.style.display='block';
    document.getElementById('heroNum').textContent='✓';
    document.getElementById('heroNum').style.fontSize='56px';
    document.getElementById('heroUnit').textContent='';
    document.getElementById('heroSub').textContent='Archived cycle';
  } else if(pinDay){
    box.classList.add('pin-mode');
    idle.style.display='none'; pin.style.display='block';
    document.getElementById('pdEye').textContent  =`Cycle #${C.cycleNum} · Week ${wk} of ${tw}`;
    document.getElementById('pdDate').textContent = fmtF(t);
    applyMark();
  } else {
    box.classList.remove('pin-mode','pinned');
    pin.style.display='none'; idle.style.display='block';
    const nE=document.getElementById('heroNum');
    const uE=document.getElementById('heroUnit');
    const sE=document.getElementById('heroSub');
    if(t<start){
      nE.textContent='—';nE.style.fontSize='';uE.textContent='';
      sE.textContent=`Blast starts ${fmtM(start)}`;
    } else if(t>end){
      nE.textContent='✓';nE.style.fontSize='56px';uE.textContent='';
      sE.textContent='Cycle complete.';
    } else {
      const np=nextPin(t),days=dif(t,np);
      if(days===1){
        nE.textContent='Tomorrow';nE.style.fontSize='28px';uE.textContent='';
        sE.textContent=fmtM(np)+' · '+C.site;
      } else {
        nE.textContent=days;nE.style.fontSize='';uE.textContent='days';
        sE.textContent=`until next pin\n${fmtM(np)} · ${C.site}`;
      }
    }
  }

  // Data strip
  const lp =prevPin(t>=start?t:new Date(start.getTime()+86400000));
  const np2=nextPin(t);
  if(lp>=start){
    document.getElementById('lastVal').textContent=fmtM(lp);
    document.getElementById('lastRel').textContent=rel(lp);
  } else {
    document.getElementById('lastVal').textContent='—';
    document.getElementById('lastRel').textContent=pinDay?'first pin':'';
  }
  document.getElementById('nextVal').textContent=inCycle?fmtM(np2):'—';
  document.getElementById('nextRel').textContent=inCycle?rel(np2):'';
  document.getElementById('endVal').textContent =fmtM(end);
  document.getElementById('endRel').textContent =rel(end);

  // Compound
  document.getElementById('compoundLine').textContent=
    `${C.compound} · ${C.dose} · ${C.mgPerPin} · ${C.needle} · ${C.site}`;

  // Progress
  document.getElementById('progVal').textContent=`Wk ${inCycle?wk:archived?tw:0} / ${tw} · ${archived?100:pct}%`;
  document.getElementById('barFill').style.width=(archived?100:pct)+'%';

  buildSched(t);
  if(!archived) setupNotifs();
}

render();
const _n=new Date();
setTimeout(function tick(){render();setTimeout(tick,86400000);},
  new Date(_n.getFullYear(),_n.getMonth(),_n.getDate()+1)-_n);
</script>
</body>
</html>
