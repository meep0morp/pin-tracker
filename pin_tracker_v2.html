<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pin Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ─────────────────────────────────────────────────────────
   RESET & ROOT
───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ffffff;
  --rule:     #dde8e2;
  --rule-hi:  #b3d1c3;
  --g900:     #0b2318;
  --g700:     #1a5c40;
  --g600:     #237052;
  --g500:     #2e8f6b;
  --g300:     #8cc9ae;
  --g200:     #c4e4d4;
  --g100:     #eaf6ef;
  --g050:     #f4fbf7;
  --t500:     #3a6b56;
  --t300:     #7aab96;
  --t100:     #c8e8db;
  --serif:    'Lora', Georgia, serif;
  --mono:     'JetBrains Mono', 'Courier New', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
}

body {
  font-family: var(--mono);
  color: var(--g900);
  padding: 20px 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
}

.wrap {
  width: 100%;
  max-width: 440px;
  animation: reveal .4s cubic-bezier(.22,1,.36,1);
}

@keyframes reveal {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─────────────────────────────────────────────────────────
   TOP STRIP — date left, cycle badge right
───────────────────────────────────────────────────────── */
.top-strip {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 20px;
}

.top-date {
  font-size: 10px;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--t300);
}

.top-badge {
  font-size: 10px;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--g700);
  font-weight: 500;
}

/* ─────────────────────────────────────────────────────────
   STATUS BLOCK — idle state
───────────────────────────────────────────────────────── */
.status-idle {
  margin-bottom: 20px;
}

.status-idle .count-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  line-height: 1;
  margin-bottom: 4px;
}

.count-num {
  font-family: var(--serif);
  font-size: 76px;
  font-weight: 700;
  color: var(--g700);
  letter-spacing: -.03em;
  line-height: .9;
}

.count-unit {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  color: var(--g500);
  letter-spacing: -.01em;
}

.status-idle .next-line {
  font-size: 11px;
  color: var(--t500);
  letter-spacing: .04em;
  margin-top: 8px;
}

/* ─────────────────────────────────────────────────────────
   STATUS BLOCK — pin day state
───────────────────────────────────────────────────────── */
.status-pinday {
  display: none;
  margin-bottom: 20px;
  background: var(--g700);
  border-radius: 10px;
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
}

.status-pinday::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,.06);
  border-radius: 50%;
}

.status-pinday::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 40px;
  width: 80px; height: 80px;
  background: rgba(255,255,255,.04);
  border-radius: 50%;
}

.pd-eyebrow {
  font-size: 9.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--g300);
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}

.pd-title {
  font-family: var(--serif);
  font-size: 46px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -.02em;
  line-height: .95;
  position: relative;
  z-index: 1;
}

.pd-sub {
  font-size: 11px;
  color: var(--g300);
  letter-spacing: .04em;
  margin-top: 10px;
  position: relative;
  z-index: 1;
}

/* ─────────────────────────────────────────────────────────
   COMPOUND ROW
───────────────────────────────────────────────────────── */
.compound-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 18px;
}

.chip {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .04em;
  padding: 3px 9px;
  border-radius: 5px;
}

.chip.hi {
  background: var(--g100);
  color: var(--g700);
  border: 1px solid var(--g200);
}

.chip.lo {
  background: transparent;
  color: var(--t500);
  border: 1px solid var(--rule);
}

/* ─────────────────────────────────────────────────────────
   PROGRESS BAR
───────────────────────────────────────────────────────── */
.progress-section {
  margin-bottom: 20px;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.progress-label span {
  font-size: 9.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--t300);
}

.progress-label .progress-val {
  color: var(--g700);
  font-weight: 500;
}

.bar-track {
  height: 4px;
  background: var(--g200);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--g700);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.22,1,.36,1);
}

/* ─────────────────────────────────────────────────────────
   DATA STRIP — Last | Next | End
───────────────────────────────────────────────────────── */
.data-strip {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border: 1px solid var(--rule);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 0;
}

.data-cell {
  padding: 11px 14px;
  border-right: 1px solid var(--rule);
}

.data-cell:last-child { border-right: none; }

.data-lbl {
  font-size: 8.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--t300);
  margin-bottom: 5px;
}

.data-val {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--g900);
  line-height: 1.3;
}

.data-val.hi { color: var(--g700); }

.data-rel {
  font-size: 9.5px;
  color: var(--t300);
  margin-top: 3px;
  font-style: italic;
}

/* ─────────────────────────────────────────────────────────
   SCHEDULE TOGGLE
───────────────────────────────────────────────────────── */
.sched-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 0;
  margin-top: 14px;
  border-top: 1px solid var(--rule);
  cursor: pointer;
  user-select: none;
  background: none;
  border-left: none;
  border-right: none;
  border-bottom: none;
  width: 100%;
  font-family: var(--mono);
}

.sched-toggle:hover .sched-lbl { color: var(--g700); }

.sched-lbl {
  font-size: 9.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--t300);
  transition: color .15s;
}

.sched-arrow {
  font-size: 9px;
  color: var(--t300);
  transition: transform .25s cubic-bezier(.22,1,.36,1);
}

.sched-arrow.open { transform: rotate(180deg); }

/* ─────────────────────────────────────────────────────────
   SCHEDULE TABLE
───────────────────────────────────────────────────────── */
.sched-table {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s cubic-bezier(.22,1,.36,1);
}

.sched-table.open { max-height: 900px; }

.sched-inner {
  padding-top: 12px;
  border-top: 1px solid var(--rule);
  margin-top: 12px;
}

.sched-head {
  display: grid;
  grid-template-columns: 28px 1fr 1fr;
  gap: 4px;
  padding: 0 2px 6px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 4px;
}

.sched-head span {
  font-size: 8.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--t300);
}

.sched-row {
  display: grid;
  grid-template-columns: 28px 1fr 1fr;
  gap: 4px;
  padding: 4px 2px;
  border-radius: 5px;
  transition: background .1s;
}

.sched-row.cur { background: var(--g050); }

.sched-wk {
  font-size: 9px;
  color: var(--t300);
  padding-top: 1px;
}

.sched-pin {
  font-size: 10.5px;
}

.sched-pin.done   { color: var(--g300); }
.sched-pin.active { color: var(--g700); font-weight: 500; }
.sched-pin.future { color: var(--t500); }
.sched-pin.empty  { color: var(--rule); }

/* ─────────────────────────────────────────────────────────
   FOOTER
───────────────────────────────────────────────────────── */
.footer {
  margin-top: 14px;
  font-size: 9px;
  letter-spacing: .07em;
  color: var(--rule-hi);
  text-align: center;
}

</style>
</head>
<body>
<div class="wrap">

  <!-- TOP STRIP -->
  <div class="top-strip">
    <div class="top-date" id="topDate">—</div>
    <div class="top-badge" id="topBadge">—</div>
  </div>

  <!-- STATUS: IDLE -->
  <div class="status-idle" id="statusIdle">
    <div class="count-row">
      <div class="count-num" id="countNum">—</div>
      <div class="count-unit" id="countUnit"></div>
    </div>
    <div class="next-line" id="nextLine"></div>
  </div>

  <!-- STATUS: PIN DAY -->
  <div class="status-pinday" id="statusPin">
    <div class="pd-eyebrow" id="pdEye"></div>
    <div class="pd-title">Pin Day.</div>
    <div class="pd-sub" id="pdSub"></div>
  </div>

  <!-- COMPOUND CHIPS -->
  <div class="compound-row" id="chips"></div>

  <!-- PROGRESS BAR -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Cycle Progress</span>
      <span class="progress-val" id="progVal">—</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill" style="width:0%"></div>
    </div>
  </div>

  <!-- DATA STRIP -->
  <div class="data-strip">
    <div class="data-cell">
      <div class="data-lbl">Last Pin</div>
      <div class="data-val" id="lastVal">—</div>
      <div class="data-rel" id="lastRel"></div>
    </div>
    <div class="data-cell">
      <div class="data-lbl">Next Pin</div>
      <div class="data-val hi" id="nextVal">—</div>
      <div class="data-rel" id="nextRel"></div>
    </div>
    <div class="data-cell">
      <div class="data-lbl">Cycle End</div>
      <div class="data-val" id="endVal">—</div>
      <div class="data-rel" id="endRel"></div>
    </div>
  </div>

  <!-- SCHEDULE TOGGLE -->
  <button class="sched-toggle" id="schedToggle" onclick="toggleSched()">
    <div class="sched-lbl">Full E3.5D Schedule</div>
    <div class="sched-arrow" id="schedArrow">▼</div>
  </button>

  <!-- SCHEDULE TABLE -->
  <div class="sched-table" id="schedTable">
    <div class="sched-inner">
      <div class="sched-head">
        <span>Wk</span><span>Monday</span><span>Thursday</span>
      </div>
      <div id="schedRows"></div>
    </div>
  </div>

  <div class="footer">auto-updates daily · e3.5d protocol · cycle #5</div>

</div><!-- /wrap -->

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const C = {
  cycleNum:    5,
  compound:    'Test C',
  dose:        '0.6 mL',
  mgPerPin:    '150 mg',
  concentration: '250 mg/mL',
  needle:      '23G 1″ IM',
  siteMon:     'Mon AM · Quad or glute',
  siteThu:     'Thu PM · Quad or glute',
  blastStart:  new Date(2026, 4, 18),  // May 18 2026 — month is 0-indexed
  durationWks: 16,
  washout:     new Date(2026, 9, 10),  // Oct 10 2026 (target end)
  pinDays:     [1, 4],                 // 1=Monday, 4=Thursday
};
// ═══════════════════════════════════════════════════════════

const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FDAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const FMTHS  = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

const z = d => { const c = new Date(d); c.setHours(0,0,0,0); return c; };
const now = () => z(new Date());
const diff = (a, b) => Math.round((z(b) - z(a)) / 86400000);
const isPinDay = d => C.pinDays.includes(z(d).getDay());
const cycleEndDate = () => { const d = new Date(C.blastStart); d.setDate(d.getDate() + C.durationWks * 7 - 1); return z(d); };

function fmt(d, short = false) {
  if (short) return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  return `${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

function fmtLong(d) {
  return `${FDAYS[d.getDay()]}, ${FMTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function prevPin(from) {
  const d = new Date(from); d.setDate(z(from).getDate() - 1);
  while (!isPinDay(d)) d.setDate(d.getDate() - 1);
  return z(d);
}

function nextPin(from) {
  const d = new Date(from); d.setDate(z(from).getDate() + 1);
  while (!isPinDay(d)) d.setDate(d.getDate() + 1);
  return z(d);
}

function cycleWeek(d) {
  const days = diff(C.blastStart, d);
  if (days < 0) return 0;
  return Math.min(C.durationWks, Math.floor(days / 7) + 1);
}

function relStr(days) {
  if (days === 0)  return 'today';
  if (days === 1)  return 'tomorrow';
  if (days === -1) return 'yesterday';
  return days < 0 ? `${Math.abs(days)}d ago` : `in ${days}d`;
}

function buildChips(isPin) {
  const el = document.getElementById('chips');
  const site = isPin ? (new Date().getDay() === 1 ? C.siteMon : C.siteThu)
                     : C.siteMon + ' / ' + C.siteThu;
  const items = [
    [C.compound, 'hi'],
    [C.dose, 'lo'],
    [C.mgPerPin, 'lo'],
    [C.needle, 'lo'],
    [site, 'lo'],
  ];
  items.forEach(([txt, cls]) => {
    const d = document.createElement('div');
    d.className = `chip ${cls}`;
    d.textContent = txt;
    el.appendChild(d);
  });
}

function buildSchedule(today) {
  const el = document.getElementById('schedRows');
  const wk = cycleWeek(today);
  for (let w = 1; w <= C.durationWks; w++) {
    const mon = new Date(C.blastStart); mon.setDate(mon.getDate() + (w-1)*7);
    const thu = new Date(mon); thu.setDate(thu.getDate() + 3);
    const mDiff = diff(today, z(mon));
    const tDiff = diff(today, z(thu));
    const cls = d => d < 0 ? 'done' : d === 0 ? 'active' : 'future';
    const sym = d => d < 0 ? '✓ ' : d === 0 ? '● ' : '';
    const row = document.createElement('div');
    row.className = `sched-row${w === wk ? ' cur' : ''}`;
    row.innerHTML = `
      <div class="sched-wk">${w}</div>
      <div class="sched-pin ${cls(mDiff)}">${sym(mDiff)}${fmt(z(mon), true)}</div>
      <div class="sched-pin ${cls(tDiff)}">${sym(tDiff)}${fmt(z(thu), true)}</div>
    `;
    el.appendChild(row);
  }
}

function toggleSched() {
  document.getElementById('schedTable').classList.toggle('open');
  document.getElementById('schedArrow').classList.toggle('open');
}

function render() {
  const t   = now();
  const wk  = cycleWeek(t);
  const end = cycleEndDate();
  const pct = Math.round(Math.min(100, Math.max(0, (wk / C.durationWks) * 100)));
  const inCycle   = diff(C.blastStart, t) >= 0 && t <= end;
  const isPinToday = isPinDay(t) && inCycle;

  // Top strip
  document.getElementById('topDate').textContent  = fmtLong(t);
  document.getElementById('topBadge').textContent =
    inCycle ? `Cycle #${C.cycleNum} · Wk ${wk}/${C.durationWks}` : `Cycle #${C.cycleNum}`;

  // Status block
  const idleEl = document.getElementById('statusIdle');
  const pinEl  = document.getElementById('statusPin');

  if (isPinToday) {
    idleEl.style.display = 'none';
    pinEl.style.display  = 'block';
    document.getElementById('pdEye').textContent = `Cycle #${C.cycleNum} · Week ${wk} of ${C.durationWks}`;
    document.getElementById('pdSub').textContent =
      `${C.compound} · ${C.dose} · ${C.needle} · ${t.getDay() === 1 ? C.siteMon : C.siteThu}`;
  } else {
    pinEl.style.display  = 'none';
    idleEl.style.display = 'block';
    const np    = nextPin(t);
    const dNext = diff(t, np);
    const numEl = document.getElementById('countNum');
    const unitEl = document.getElementById('countUnit');
    const nextLine = document.getElementById('nextLine');

    if (!inCycle && diff(C.blastStart, t) < 0) {
      numEl.textContent  = '—';
      unitEl.textContent = '';
      nextLine.textContent = `Blast starts ${fmt(C.blastStart)}`;
    } else if (t > end) {
      numEl.textContent  = '✓';
      unitEl.textContent = '';
      nextLine.textContent = 'Cycle complete.';
    } else if (dNext === 1) {
      numEl.textContent  = 'Tomorrow';
      numEl.style.fontSize = '44px';
      unitEl.textContent = '';
      nextLine.textContent = fmt(np) + ' · ' + (np.getDay() === 1 ? C.siteMon : C.siteThu);
    } else {
      numEl.textContent  = dNext;
      numEl.style.fontSize = '';
      unitEl.textContent = dNext === 1 ? 'day' : 'days';
      nextLine.textContent = 'until next injection — ' + fmt(np);
    }
  }

  // Chips
  buildChips(isPinToday);

  // Progress bar
  document.getElementById('progVal').textContent = `Wk ${inCycle ? wk : 0} / ${C.durationWks} · ${pct}%`;
  document.getElementById('barFill').style.width = pct + '%';

  // Data strip
  const lp = prevPin(t >= C.blastStart ? t : C.blastStart);
  const np2 = nextPin(t);
  document.getElementById('lastVal').textContent = lp >= C.blastStart ? fmt(lp) : '—';
  document.getElementById('lastRel').textContent = lp >= C.blastStart ? relStr(diff(t, lp)) : '';
  document.getElementById('nextVal').textContent = t <= end ? fmt(np2) : '—';
  document.getElementById('nextRel').textContent = t <= end ? relStr(diff(t, np2)) : '';
  document.getElementById('endVal').textContent  = fmt(C.washout);
  document.getElementById('endRel').textContent  = relStr(diff(t, C.washout));

  // Schedule
  buildSchedule(t);
}

render();

// Auto-refresh at midnight
const ms = new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + 1) - new Date();
setTimeout(() => { render(); setInterval(render, 86400000); }, ms);
</script>
</body>
</html>
